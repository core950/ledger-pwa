<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>刷新墨账</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0b0b0b;
        background: #f7f7f4;
      }

      main {
        width: min(100%, 460px);
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
      }

      p {
        margin: 0;
        color: #666;
        line-height: 1.7;
      }

      button,
      a {
        min-height: 48px;
        border: 1px solid #0b0b0b;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #0b0b0b;
        color: white;
        text-decoration: none;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>刷新墨账</h1>
      <p id="status">正在清理旧离线缓存，不会删除你的账本数据。</p>
      <a href="./?v=12" id="homeLink">回到墨账</a>
    </main>

    <script>
      async function resetAppCache() {
        const status = document.querySelector("#status");

        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }

          status.textContent = "旧缓存已清理。请点下面按钮回到墨账，页面会重新载入最新版本。";
        } catch (error) {
          status.textContent = "缓存清理时遇到问题。请点下面按钮回到墨账，或稍后重试。";
        }
      }

      resetAppCache();
    </script>
  </body>
</html>
